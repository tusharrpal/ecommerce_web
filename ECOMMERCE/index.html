<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Apna Bazar</title>
    <link rel="stylesheet" href="./home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <nav class="navbar">
        <div class="navbar-left">
            <a href="./index.html" class="logo">Apna Bazar</a>
        </div>
        <div class="nav-links">
            <a href="./index.html">Home</a>
            <a href="#shop-section">Shop</a>
            <a href="#deals">Deals</a>
        </div>
        <div class="navbar-center">
            <input type="search" placeholder="Search..." id="search-bar">
        </div>
        <div class="navbar-right">
            <a href="./Cart.html" class="icon cart-icon"><i class="fa-solid fa-cart-shopping"></i><span id="cart-count">0</span></a>
            <a href="#" class="icon"><i class="fa-solid fa-user"></i></a>
        </div>
    </nav>

    <section class="hero">
        <div>
            <p class="eyebrow">Fresh deals daily</p>
            <h1>Minimal shopping, better picks.</h1>
            <p class="hero-copy">Browse curated products, compare prices quickly, and add favorites to your cart in one clean flow.</p>
        </div>
        <div class="hero-stat" id="deals">
            <span>Free delivery</span>
            <strong>On every order</strong>
        </div>
    </section>

    <section class="shop-toolbar" id="shop-section">
        <div>
            <p class="eyebrow">Catalog</p>
            <h2>Featured products</h2>
        </div>
        <div class="toolbar-controls">
            <select id="category-filter" aria-label="Filter by category">
                <option value="all">All categories</option>
            </select>
            <select id="sort-products" aria-label="Sort products">
                <option value="featured">Featured</option>
                <option value="price-low">Price: Low to high</option>
                <option value="price-high">Price: High to low</option>
                <option value="rating">Top rated</option>
            </select>
        </div>
    </section>

    <p id="result-count" class="result-count"></p>
    <div id="containerBox"></div>

    <script src="./home.js"></script>
</body>

</html>
